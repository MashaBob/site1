<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | Capital Inteligente</title>

<style>

/* =========================
   GLOBAL BACKGROUND
========================= */

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    overflow:hidden;
    position:relative;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-2;
}

/* GLOW */
body::after{
    content:"";
    position:fixed;
    width:900px;
    height:900px;
    background:radial-gradient(circle, rgba(0,255,200,0.18), transparent 60%);
    top:-200px;
    right:-250px;
    filter:blur(70px);
    z-index:-1;
    animation:move 6s ease-in-out infinite alternate;
}

@keyframes move{
    from{transform:translateY(0);}
    to{transform:translateY(40px);}
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:100vh;
    padding:0 80px;
}

/* =========================
   LEFT
========================= */

.left{
    width:50%;
}

/* CALCULATOR */
.calculator{
    padding:20px;
}

.calculator h2{
    font-size:28px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

.result{
    margin-top:10px;
    color:#00ffcc;
}

/* =========================
   RIGHT REGISTER
========================= */

.right{
    width:400px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(20px);
}

/* =========================
   GLOBE (SBOKU)
========================= */

.globe{
    position:fixed;
    width:700px;
    height:700px;
    right:-250px;
    bottom:-200px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(0,255,200,0.12), transparent 60%);
    filter:blur(10px);
    z-index:-1;
    animation:spin 12s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- GLOBE -->
<div class="globe"></div>

<div class="container">

<!-- LEFT -->
<div class="left">

    <div class="calculator">
        <h2>Calcula tu capital inteligente</h2>

        <input id="amount" type="number" placeholder="Capital inicial">
        <input id="percent" type="number" placeholder="Rentabilidad %">
        <input id="days" type="number" placeholder="Días">

        <button onclick="calc()">Calcular</button>

        <div class="result" id="result">Resultado: $0</div>
    </div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="box">

<h2>Crear cuenta</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Contraseña">
<input type="password" placeholder="Confirmar">

<button onclick="register()">Crear cuenta</button>

<br><br>

<button onclick="googleLogin()">Google</button>
<button onclick="loginWithFacebook()">Facebook</button>

</div>

</div>

</div>

<!-- =========================
   JS CALCULATOR
========================= -->

<script>
function calc(){

    let amount = parseFloat(document.getElementById("amount").value);
    let percent = parseFloat(document.getElementById("percent").value);
    let days = parseFloat(document.getElementById("days").value);

    if(isNaN(amount) || isNaN(percent) || isNaN(days)){
        document.getElementById("result").innerHTML =
        "Introduce todos los valores";
        return;
    }

    let result = amount * Math.pow((1 + percent/100), days);

    document.getElementById("result").innerHTML =
    "Resultado: $" + result.toFixed(2);
}
</script>

<!-- =========================
   FIREBASE
========================= -->

<script type="module">

import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */

  authDomain: "capital-inteligente-14b57.firebaseapp.com",
  projectId: "capital-inteligente-14b57",
  storageBucket: "capital-inteligente-14b57.appspot.com",
  messagingSenderId: "636226243947",
  appId: "1:636226243947:web:fdca179b00f37135e7902e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* GOOGLE */
window.googleLogin = async function(){

    const provider = new GoogleAuthProvider();

    try{
        const result = await signInWithPopup(auth, provider);
        alert("Bienvenida " + result.user.displayName);
        window.location.href = "dashboard.html";
    }catch(e){
        alert("Error Google Login");
        console.log(e);
    }
}

/* FACEBOOK */
window.loginWithFacebook = async function(){

    const provider = new FacebookAuthProvider();

    try{
        const result = await signInWithPopup(auth, provider);
        alert("Facebook login OK");
        window.location.href = "dashboard.html";
    }catch(e){
        alert("Error Facebook Login");
        console.log(e);
    }
}

</script>

</body>
</html>
