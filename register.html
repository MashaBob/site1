<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | Capital Inteligente</title>

<style>

/* =========================
   GLOBAL BACKGROUND
========================= */

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    overflow:hidden;
    position:relative;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-3;
}

/* GLOW */
body::after{
    content:"";
    position:fixed;
    width:900px;
    height:900px;
    background:radial-gradient(circle, rgba(0,255,200,0.18), transparent 60%);
    top:-200px;
    right:-250px;
    filter:blur(70px);
    z-index:-2;
}

/* =========================
   SPHERE CONTAINER
========================= */

#sphere{
    position:fixed;
    width:600px;
    height:600px;
    right:-220px;
    bottom:-200px;
    z-index:-1;
    opacity:0.9;
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:100vh;
    padding:0 80px;
}

/* LEFT */
.left{
    width:50%;
}

/* CALCULATOR */
.calculator{
    padding:20px;
}

.calculator h2{
    font-size:28px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

.result{
    margin-top:10px;
    color:#00ffcc;
}

/* RIGHT */
.right{
    width:400px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(20px);
}

/* =========================
   GLOBE VISUAL
========================= */

.globe{
    position:fixed;
    width:700px;
    height:700px;
    right:-250px;
    bottom:-200px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(0,255,200,0.12), transparent 60%);
    filter:blur(10px);
    z-index:-1;
}

</style>
</head>

<body>

<!-- SPHERE -->
<div id="sphere"></div>

<!-- GLOBE LIGHT -->
<div class="globe"></div>

<div class="container">

<!-- LEFT -->
<div class="left">

    <div class="calculator">
        <h2>Calcula tu capital inteligente</h2>

        <input id="amount" type="number" placeholder="Capital inicial">

        <div style="opacity:0.8;margin:5px 0;">
            Rentabilidad fija: <b>6% mensual</b>
        </div>

        <input id="days" type="number" placeholder="Días de inversión">

        <button onclick="calc()">Calcular</button>

        <div class="result" id="result">Resultado: $0</div>
    </div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="box">

<h2>Crear cuenta</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Contraseña">
<input type="password" placeholder="Confirmar">

<button onclick="register()">Crear cuenta</button>

<br><br>

<button onclick="googleLogin()">Google</button>
<button onclick="loginWithFacebook()">Facebook</button>

</div>

</div>

</div>

<!-- =========================
   CALCULATOR FIXED
========================= -->

<script>
function calc(){

    let amount = parseFloat(document.getElementById("amount").value);
    let days = parseFloat(document.getElementById("days").value);

    let percent = 6;

    if (isNaN(amount) || isNaN(days)) {
        document.getElementById("result").innerHTML =
        "Introduce todos los valores";
        return;
    }

    let result = amount * Math.pow((1 + percent/100), days);

    document.getElementById("result").innerHTML =
    "Resultado: $" + result.toFixed(2);
}
</script>

<!-- =========================
   3D SPHERE (MOUSE CONTROL)
========================= -->

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);

let renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
renderer.setSize(600,600);
document.getElementById("sphere").appendChild(renderer.domElement);

let geometry = new THREE.SphereGeometry(2, 32, 32);

let material = new THREE.PointsMaterial({
    color: 0x00ffcc,
    size: 0.03
});

let sphere = new THREE.Points(geometry, material);
scene.add(sphere);

camera.position.z = 5;

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e)=>{
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function animate(){
    requestAnimationFrame(animate);

    sphere.rotation.y += 0.002;
    sphere.rotation.x += 0.001;

    sphere.rotation.y += mouseX * 0.01;
    sphere.rotation.x += mouseY * 0.01;

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
