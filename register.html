<script>
function calc(){

    let amount = parseFloat(document.getElementById("amount").value);
    let percent = parseFloat(document.getElementById("percent").value);
    let days = parseFloat(document.getElementById("days").value);

    if (
        isNaN(amount) ||
        isNaN(percent) ||
        isNaN(days)
    ) {
        document.getElementById("result").innerHTML =
        "Introduce todos los valores";
        return;
    }

    let result = amount * Math.pow((1 + percent/100), days);

    document.getElementById("result").innerHTML =
    "Resultado: $ " + result.toFixed(2);
}
  }

  let result = amount * Math.pow((1 + percent/100), days);

  document.getElementById("result").innerHTML =
  "Resultado: $" + result.toFixed(2);

}
</script>
/* ================================================= */
/* ОСНОВНЫЕ СТИЛИ */

body{

    padding:0;

    font-family:Arial;

    color:white;

    overflow:hidden;

    position:relative;

}

/* ================================================= */
/* ФОНОВАЯ СЕТКА */
/* ================================================= */

body::before{

    content:"";

    position:fixed;

    width:100%;
    height:100%;

    background-image:

    linear-gradient(
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    );

    background-size:40px 40px;

    z-index:-2;

}

/* ================================================= */
/* GLOW BACKGROUND */
/* ================================================= */

.background-glow{

    position:absolute;

    width:800px;
    height:800px;

    background:radial-gradient(
        circle,
        rgba(0,255,200,0.18),
        transparent
    );

    top:-250px;
    right:-200px;

    filter:blur(60px);

    z-index:-1;

    animation:glowMove 6s infinite alternate;

}

/* ================================================= */
/* АНИМАЦИЯ GLOW */
/* ================================================= */

@keyframes glowMove{

    from{

        transform:
        translateY(0px)
        scale(1);

    }

    to{

        transform:
        translateY(30px)
        scale(1.08);

    }

}
