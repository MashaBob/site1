<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | Capital Inteligente</title>

<style>

/* ===================== BODY ===================== */
body{
    margin:0;
    padding:0;
    background:#0b1220;
    font-family:Arial;
    color:white;
}

/* ===================== LAYOUT ===================== */
.container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    min-height:100vh;
    padding:60px;
}

/* ===================== LEFT ===================== */
.left{
    width:45%;
}

/* ===================== CALCULATOR ===================== */
.calculator{
    margin-top:20px;
    padding:25px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,255,200,0.2);
    border-radius:20px;
    backdrop-filter:blur(10px);
    max-width:400px;
}

.calculator h2{
    margin-bottom:15px;
    color:#00ffcc;
}

.calculator input{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#0f172a;
    color:white;
}

.calculator button{
    width:100%;
    padding:12px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

#result{
    margin-top:10px;
    font-weight:bold;
    color:#00ffcc;
}

/* ===================== RIGHT ===================== */
.right{
    width:40%;
}

/* ===================== REGISTER BOX ===================== */
.register-box{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,255,200,0.2);
    border-radius:30px;
    padding:40px;
}

/* inputs */
input{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    background:#0f172a;
    color:white;
}

/* register button */
.register-btn{
    width:100%;
    padding:15px;
    margin-top:15px;
    background:#00ffcc;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

/* social buttons */
.social-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.google{background:white;color:black;}
.facebook{background:#1877f2;color:white;}

</style>

</head>

<body>

<div class="container">

<!-- ================= LEFT ================= -->
<div class="left">

<h1>Capital Inteligente</h1>

<div class="calculator">

<h2>Calcula tu capital inteligente</h2>

<input id="amount" type="number" placeholder="Capital inicial ($)">
<input id="percent" type="number" placeholder="Rentabilidad (%)">
<input id="days" type="number" placeholder="Días">

<button onclick="calc()">Calcular</button>

<div id="result">Resultado: $0</div>

</div>

</div>

<!-- ================= RIGHT ================= -->
<div class="right">

<div class="register-box">

<h2>Crear cuenta</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button class="register-btn">Crear cuenta</button>

<!-- SOCIAL LOGIN -->
<button class="social-btn google" onclick="googleLogin()">Google</button>
<button class="social-btn facebook" onclick="loginWithFacebook()">Facebook</button>

</div>

</div>

</div>

<!-- ================= CALCULATOR JS ================= -->
<script>

function calc(){

    let amount = parseFloat(document.getElementById("amount").value);
    let percent = parseFloat(document.getElementById("percent").value);
    let days = parseFloat(document.getElementById("days").value);

    if(isNaN(amount) || isNaN(percent) || isNaN(days)){
        document.getElementById("result").innerHTML =
        "Introduce todos los valores";
        return;
    }

    let result = amount * Math.pow((1 + percent/100), days);

    document.getElementById("result").innerHTML =
    "Resultado: $ " + result.toFixed(2);

}

</script>

<!-- ================= FIREBASE (GOOGLE + FACEBOOK) ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  FacebookAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ===== YOUR FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "capital-inteligente-14b57.firebaseapp.com",
  projectId: "capital-inteligente-14b57",
  storageBucket: "capital-inteligente-14b57.appspot.com",
  messagingSenderId: "636226243947",
  appId: "1:636226243947:web:fdca179b00f37135e7902e"
};

/* INIT ONCE */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* PROVIDERS */
const googleProvider = new GoogleAuthProvider();
const facebookProvider = new FacebookAuthProvider();

/* ================= GOOGLE LOGIN ================= */
window.googleLogin = async function(){

    try {
        const result = await signInWithPopup(auth, googleProvider);
        window.location.href = "dashboard.html";
    } catch (e) {
        console.log(e);
        alert("Google login error");
    }

}

/* ================= FACEBOOK LOGIN ================= */
window.loginWithFacebook = async function(){

    try {
        const result = await signInWithPopup(auth, facebookProvider);
        window.location.href = "dashboard.html";
    } catch (e) {
        console.log(e);
        alert("Facebook login error: " + e.message);
    }

}

</script>

</body>
</html>
