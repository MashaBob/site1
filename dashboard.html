<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital AI Pro | Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= BASE ================= */
body{
margin:0;
font-family:Arial;
background:#070b14;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* ================= SIDEBAR ================= */
.sidebar{
width:220px;
background:#0b1220;
padding:20px;
}

.logo{
font-size:18px;
font-weight:bold;
color:#00ffcc;
margin-bottom:30px;
}

.menu div{
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.menu div:hover{
background:#111a2e;
}

/* ================= MAIN ================= */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* TOP CARDS */
.cards{
display:flex;
gap:15px;
}

.card{
flex:1;
background:#0e1628;
padding:15px;
border-radius:15px;
}

.green{color:#00ffcc}

/* ================= CHART ================= */
.chartBox{
margin-top:20px;
background:#0e1628;
padding:15px;
border-radius:15px;
}

/* ================= WALLET ================= */
.wallet{
background:#0e1628;
padding:15px;
border-radius:15px;
margin-top:20px;
}

/* ================= ACTIVITY ================= */
.activity{
background:#0e1628;
padding:15px;
border-radius:15px;
margin-top:20px;
}

/* ================= GLOBE ================= */
.globeBox{
position:absolute;
right:20px;
top:80px;
width:300px;
height:300px;
}

canvas{
width:100%;
height:100%;
}

/* FLOAT DOT */
.glow{
position:absolute;
width:400px;
height:400px;
right:-100px;
bottom:-100px;
background:radial-gradient(circle,#00ffcc33,transparent 60%);
filter:blur(20px);
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">CAPITAL AI PRO</div>

<div class="menu">
<div>📊 Panel</div>
<div>💼 Wallet</div>
<div>📈 Señales AI</div>
<div>🌍 Markets</div>
<div>⚙ Ajustes</div>
</div>
</div>

<!-- MAIN -->
<div class="main">

<h2>Hola 👋 Trader</h2>

<!-- CARDS -->
<div class="cards">

<div class="card">
Saldo<br>
<h3>$10,000</h3>
</div>

<div class="card">
ROI<br>
<h3 class="green">+6% mensual</h3>
</div>

<div class="card">
Riesgo<br>
<h3>Low</h3>
</div>

</div>

<!-- CHART -->
<div class="chartBox">
<canvas id="chart"></canvas>
</div>

<!-- WALLET -->
<div class="wallet">
<h3>Wallet</h3>
Disponible: <b class="green">$1,234.56</b><br>
Bloqueado: $0
</div>

<!-- ACTIVITY -->
<div class="activity">
<h3>AI Activity</h3>
<div>🤖 BTC signal detected</div>
<div>📊 Portfolio balanced</div>
<div>📈 Market trend bullish</div>
</div>

</div>
</div>

<!-- GLOBE -->
<div class="globeBox">
<canvas id="globe"></canvas>
</div>

<div class="glow"></div>

<script>

/* ================= CHART ================= */
const ctx = document.getElementById('chart');

new Chart(ctx, {
type:'line',
data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets:[{
label:'Portfolio',
data:[10000,10500,10200,11000,11500,12000,12500],
borderColor:'#00ffcc',
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{display:false}
}
}
});

/* ================= GLOBE (SIMPLE 3D DOT SPHERE) ================= */
const canvas = document.getElementById("globe");
const ctx2 = canvas.getContext("2d");

canvas.width = 300;
canvas.height = 300;

let dots = [];

for(let i=0;i<200;i++){
dots.push({
x:Math.random()*300,
y:Math.random()*300,
r:Math.random()*2
});
}

function draw(){
ctx2.clearRect(0,0,300,300);

for(let d of dots){
ctx2.beginPath();
ctx2.arc(d.x,d.y,d.r,0,Math.PI*2);
ctx2.fillStyle="#00ffcc";
ctx2.fill();
d.x += Math.sin(Date.now()*0.001 + d.y)*0.3;
d.y += Math.cos(Date.now()*0.001 + d.x)*0.3;
}

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
