<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel Pro Trader</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050914;
color:white;
overflow:hidden;
}

.layout{
display:grid;
grid-template-columns:260px 1fr 380px;
height:100vh;
}

.left{
background:#0b1220;
padding:15px;
}

.btn{
background:#111b2e;
padding:10px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
}

.center{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.kpis{
display:flex;
gap:10px;
}

.kpi{
flex:1;
background:#0d1628;
padding:10px;
border-radius:12px;
}

.kpi.active{
border:1px solid #00ffcc;
}

.card{
background:#0d1628;
padding:12px;
border-radius:12px;
}

.right{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.widget{
background:#0d1628;
padding:12px;
border-radius:12px;
}

.gameBox{
background:#08101f;
border-radius:12px;
height:260px;
position:relative;
overflow:hidden;
}

.ball{
width:14px;
height:14px;
border-radius:50%;
background:#00ffcc;
position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
}

.globe{
position:absolute;
right:10px;
top:10px;
width:120px;
height:120px;
}

.news{
background:#111b2e;
padding:10px;
border-radius:10px;
position:relative;
}

.lock{
position:absolute;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.lock button{
margin-top:10px;
background:#00ffcc;
border:none;
padding:6px;
border-radius:8px;
cursor:pointer;
}

.whatsapp{
background:#25D366;
color:black;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div class="layout">

<!-- LEFT -->
<div class="left">
<h3>PANEL PRO</h3>
<div class="btn">Dashboard</div>
<div class="btn">Wallet</div>
<div class="btn">Mercados</div>
<div class="btn">Configuración</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="kpis">

<div class="kpi">
💰 Saldo<br>
<b id="saldo">$10,000</b>
</div>

<div class="kpi">
📈 Ganancia diaria<br>
<b id="daily">$0</b>
</div>

<div class="kpi">
⚡ ROI<br>
<b>+4%</b>
</div>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="widget">
<h4>🎮 Game + Globo</h4>

<div class="gameBox">
<div class="ball" id="ball"></div>
<div class="globe" id="globe"></div>
</div>

<p>Rendimiento: <b id="rend">0%</b></p>
</div>

<!-- 🔥 NEW LEVEL SYSTEM -->
<div class="widget">
<h4>⭐ Nivel del inversor</h4>
Nivel: <b id="nivel">2 / 30</b>
<br><br>

<button onclick="subscribe()" style="background:#00ffcc;border:none;padding:6px;border-radius:8px;cursor:pointer;">
Suscribirse Noticias (17 MXN)
</button>
</div>

<div class="widget">
<h4>📊 Stats</h4>
Trades: <b id="trades">0</b>
</div>

<div class="widget">
<h4>📰 Noticias</h4>

<div class="news">
<div>Bitcoin estable</div>
<div>Ethereum en alza</div>

<div class="lock" id="lock">
🔒 Premium Noticias
<button onclick="subscribe()">Activar</button>
</div>

</div>

</div>

<div class="whatsapp" onclick="wa()">
📞 Agendar llamada con asesor
</div>

</div>

</div>

<script>

/* ================= GAME STATE ================= */

let balance = 10000;
let daily = 0;
let trades = 0;
let history = [10000];

/* ================= LEVEL SYSTEM ================= */

let nivel = 2;
let puntos = 2;
let suscrito = false;

/* + level helper */
function addLevel(p){
puntos += p;
nivel = Math.min(30, puntos);
document.getElementById("nivel").innerText = nivel + " / 30";
}

/* ================= CHART ================= */

const ctx = document.getElementById("chart");

let chart = new Chart(ctx,{
type:"line",
data:{
labels:["D1"],
datasets:[{
data:history,
borderColor:"#00ffcc",
tension:0.3
}]
},
options:{plugins:{legend:{display:false}}}
});

/* ================= GAME (NO CHANGED) ================= */

let ball = document.getElementById("ball");
let y = 0;
let speed = 0;
let dragging = false;
let startY = 0;
let scored = false;

ball.onmousedown = (e)=>{
dragging = true;
startY = e.clientY;
};

document.onmouseup = (e)=>{
if(!dragging) return;

speed = (startY - e.clientY) * 0.12;
dragging = false;

trades++;
document.getElementById("trades").innerText = trades;

scored = false;
};

function loop(){

y += speed;
speed -= 0.25;

if(y < 0){ y = 0; speed = 0; }

ball.style.bottom = (20 + y) + "px";

if(y > 170 && !scored){

scored = true;

let hit = [0.5,1,2,3,4,5,6][Math.floor(Math.random()*6)];

daily += hit;
balance += hit;

document.getElementById("rend").innerText = hit + "%";
document.getElementById("daily").innerText = "$" + daily.toFixed(2);
document.getElementById("saldo").innerText = "$" + balance.toFixed(2);

history.push(balance);
chart.data.labels.push("D"+history.length);
chart.data.datasets[0].data = [...history];
chart.update();

/* 🔥 LEVEL BOOST FROM GAME */
addLevel(1);

y = 0;
speed = 0;
}

requestAnimationFrame(loop);
}

loop();

/* ================= SUBSCRIPTION ================= */

function subscribe(){
if(!suscrito){
suscrito = true;
document.getElementById("lock").style.display="none";
addLevel(5);
}
}

/* ================= WHATSAPP ================= */

function wa(){
window.open("https://wa.me/5210000000000","_blank");
}

/* ================= GLOBE ================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(120,120);
document.getElementById("globe").appendChild(renderer.domElement);

const globe = new THREE.Points(
new THREE.SphereGeometry(1,18,18),
new THREE.PointsMaterial({color:0x00ffcc,size:0.05})
);

scene.add(globe);
camera.position.z = 2.5;

function animate(){
requestAnimationFrame(animate);
globe.rotation.y += 0.01;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
