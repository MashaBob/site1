<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital AI PRO - Level 2</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050914;
color:#e6edf7;
overflow:hidden;
}

/* LAYOUT */
.dashboard{
display:grid;
grid-template-columns:260px 1fr 420px;
height:100vh;
gap:12px;
padding:12px;
box-sizing:border-box;
}

/* SIDEBAR */
.sidebar{
background:#0c1324;
border-radius:14px;
padding:15px;
}

.nav{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#0f1a33;
cursor:pointer;
font-size:14px;
}

.nav:hover{
background:#152545;
}

/* CENTER */
.center{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#0c1324;
padding:12px;
border-radius:12px;
}

/* RIGHT */
.right{
display:flex;
flex-direction:column;
gap:12px;
}

/* WIDGET */
.widget{
background:#0c1324;
border-radius:12px;
padding:12px;
}

/* GLOBE */
#globe{
height:300px;
}

/* COLORS */
.green{color:#00ffcc}
.small{font-size:12px;opacity:0.7}

button{
background:#00ffcc;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
width:100%;
margin-top:6px;
}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>PANEL PRO</h3>

<div class="nav">Dashboard</div>
<div class="nav">Wallet</div>
<div class="nav">Markets</div>
<div class="nav">Settings</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="card">
<h2>Hola Trader 👋</h2>
Saldo: <b>$10,000</b><br>
ROI: <span class="green">+6% mensual</span>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<!-- GLOBE GAME -->
<div class="widget">
<h4>🌍 Rendimiento Game</h4>
<div class="small">Lanza la bola y gana porcentaje</div>

<div id="globe"></div>

<b class="green" id="reward">Rendimiento: 0%</b>

</div>

<!-- WALLET -->
<div class="widget">
<h4>Wallet</h4>
<b class="green">$1,234.56</b>
</div>

</div>

</div>

<script>

/* ================= GAME DATA ================= */

let reward = 0;
let percentages = [0.5,1,2,3,4,5,6];

/* ================= FUNCTION HIT ================= */
function hit(){

let value = percentages[Math.floor(Math.random()*percentages.length)];
reward += value;

document.getElementById("reward").innerText =
"Rendimiento: " + reward.toFixed(2) + "%";
}

/* ================= THREE JS GLOBE ================= */

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,1,0.1,1000);

let renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(420,300);

document.getElementById("globe").appendChild(renderer.domElement);

/* globe */
let globe = new THREE.Points(
new THREE.SphereGeometry(1.5,32,32),
new THREE.PointsMaterial({
color:0x00ffcc,
size:0.02
})
);

scene.add(globe);
camera.position.z = 3;

/* CLICK = THROW BALL */
renderer.domElement.addEventListener("click",()=>{
hit();
});

/* ANIMATION */
function animate(){

requestAnimationFrame(animate);

/* rotation depends on reward */
globe.rotation.y += 0.002 + reward * 0.00001;

/* visual evolution */
globe.material.size = 0.02 + reward * 0.00005;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
