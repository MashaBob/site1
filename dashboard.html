<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capital AI Pro | Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

/* =========================
   BASE
========================= */

body{
    margin:0;
    font-family:Arial;
    background:#070B14;
    color:#E6EDF7;
    overflow:hidden;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-3;
}

/* GLOW */
body::after{
    content:"";
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle, rgba(0,229,168,0.15), transparent 60%);
    top:-200px;
    right:-200px;
    filter:blur(60px);
    z-index:-2;
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:rgba(255,255,255,0.03);
    padding:20px;
    backdrop-filter:blur(20px);
}

.logo{
    color:#00E5A8;
    font-weight:bold;
    margin-bottom:25px;
}

.menu div{
    padding:10px;
    color:#8B93A7;
    cursor:pointer;
}
.menu div:hover{
    color:#00E5A8;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    position:relative;
    z-index:2;
}

/* TOP */
.top{
    display:flex;
    justify-content:space-between;
}

/* CARDS */
.cards{
    display:flex;
    gap:15px;
    margin-top:10px;
}

.card{
    flex:1;
    background:rgba(255,255,255,0.04);
    padding:15px;
    border-radius:12px;
}

/* CHART */
.chartBox{
    margin-top:15px;
    background:rgba(255,255,255,0.04);
    padding:15px;
    border-radius:12px;
}

/* AI */
.aiBox{
    margin-top:15px;
    background:rgba(255,255,255,0.04);
    padding:15px;
    border-radius:12px;
}

.signal{
    padding:8px;
    margin-top:5px;
    border-left:3px solid #00E5A8;
    background:rgba(0,229,168,0.08);
}

/* =========================
   3D GLOBE
========================= */

#globe{
    position:fixed;
    right:-150px;
    bottom:-150px;
    width:500px;
    height:500px;
    z-index:0;
    opacity:0.6;
}

/* BUTTON */
button{
    background:#00E5A8;
    border:none;
    padding:8px;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- 3D GLOBE -->
<div id="globe"></div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">CAPITAL AI</div>

<div class="menu">
<div>Panel</div>
<div>Wallet</div>
<div>AI Signals</div>
<div>Markets</div>
<div onclick="logout()">Salir</div>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
<h2 id="user">Hola 👋</h2>
<div>AI Status: 🟢 Active</div>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">Balance<br><b>$10,000</b></div>
<div class="card">ROI<br><b>+8.4%</b></div>
<div class="card">Risk<br><b>Low</b></div>
</div>

<!-- CHART -->
<div class="chartBox">
<canvas id="chart"></canvas>
</div>

<!-- AI SIGNALS -->
<div class="aiBox">
<h3>AI Signals</h3>
<div class="signal">BUY BTC (momentum detected)</div>
<div class="signal">HOLD ETH (stable zone)</div>
<div class="signal">REBALANCE portfolio</div>
</div>

</div>

</div>

<script>

/* =========================
   USER
========================= */

let user = localStorage.getItem("user");
if(user){
document.getElementById("user").innerText = "Hola " + user;
}

/* =========================
   CHART
========================= */

new Chart(document.getElementById("chart"), {
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat"],
datasets:[{
data:[10000,10250,10100,10500,10800,11200],
borderColor:"#00E5A8",
backgroundColor:"rgba(0,229,168,0.1)",
fill:true
}]
}
});

/* =========================
   LOGOUT
========================= */

function logout(){
localStorage.removeItem("user");
window.location.href="index.html";
}

/* =========================
   3D GLOBE (simple network sphere)
========================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(500,500);
document.getElementById("globe").appendChild(renderer.domElement);

const geometry = new THREE.SphereGeometry(2,32,32);
const material = new THREE.PointsMaterial({
color:0x00E5A8,
size:0.05
});

const sphere = new THREE.Points(geometry, material);
scene.add(sphere);

camera.position.z = 5;

function animate(){
requestAnimationFrame(animate);
sphere.rotation.y += 0.002;
sphere.rotation.x += 0.001;
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
