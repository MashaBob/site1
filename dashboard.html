<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capital AI PRO V3 FIX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050914;
color:white;
overflow:hidden;
}

.grid{
display:grid;
grid-template-columns:240px 1fr 420px;
height:100vh;
gap:10px;
padding:10px;
box-sizing:border-box;
}

/* SIDEBAR */
.sidebar{
background:#0b1220;
padding:15px;
border-radius:12px;
}

.nav{
padding:10px;
margin-bottom:6px;
background:#111b2e;
border-radius:8px;
}

/* CENTER */
.center{
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* RIGHT */
.right{
display:flex;
flex-direction:column;
gap:10px;
}

.widget{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* GAME */
.game{
height:200px;
background:#08101f;
border-radius:12px;
position:relative;
overflow:hidden;
}

.ball{
width:18px;
height:18px;
background:#00ffcc;
border-radius:50%;
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
}

/* NEWS */
.news{
position:relative;
background:#101b33;
padding:10px;
border-radius:10px;
overflow:hidden;
}

.lock{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
}

.lock button{
margin-top:10px;
background:#00ffcc;
border:none;
padding:6px;
border-radius:8px;
cursor:pointer;
}

/* GLOBE */
#globe{
height:220px;
}

/* COLORS */
.green{color:#00ffcc}

canvas{
max-width:100%;
}

</style>
</head>

<body>

<div class="grid">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>PANEL PRO</h3>
<div class="nav">Dashboard</div>
<div class="nav">Wallet</div>
<div class="nav">Markets</div>
<div class="nav">Settings</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="card">
<h2>Hola Trader 👋</h2>
Saldo: <b id="balance">$10,000</b><br>
ROI: <span class="green">+6% mensual</span>
</div>

<div class="card">
<h4>📊 Statistics</h4>
<canvas id="chart"></canvas>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<!-- GAME -->
<div class="widget">
<h4>🎮 Skill Game</h4>

<div class="game" id="game">
<div class="ball" id="ball"></div>
</div>

<div>Rendimiento: <b id="result">0%</b></div>
</div>

<!-- WALLET -->
<div class="widget">
<h4>Wallet</h4>
<b class="green" id="wallet">$1,234.56</b>
</div>

<!-- GLOBE -->
<div class="widget">
<h4>🌍 Globe</h4>
<div id="globe"></div>
</div>

<!-- NEWS -->
<div class="widget">
<h4>📰 Noticias</h4>

<div class="news">

<div>Bitcoin estable en el mercado</div>
<div>Ethereum en crecimiento</div>
<div>Mercados globales mixtos</div>

<div class="lock" id="lock">
🔒 Premium bloqueado<br>
17 MXN / mes
<button onclick="unlock()">Desbloquear</button>
</div>

</div>

</div>

</div>

</div>

<script>

/* ================= CHART ================= */
const ctx = document.getElementById("chart");

new Chart(ctx,{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri"],
datasets:[{
data:[10000,10200,10100,10800,11200],
borderColor:"#00ffcc",
tension:0.3
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{display:false}
}
}
});

/* ================= GAME ================= */

let ball = document.getElementById("ball");
let pos = 0;
let speed = 0;
let drag = false;
let startY = 0;

ball.addEventListener("mousedown",(e)=>{
drag = true;
startY = e.clientY;
});

document.addEventListener("mouseup",(e)=>{
if(!drag) return;

speed = (startY - e.clientY) * 0.12;
drag = false;
});

function gameLoop(){

pos += speed;
speed -= 0.35;

ball.style.bottom = pos + "px";

if(pos > 160){

let values = [0.5,1,2,3,4,5,6];
let hit = values[Math.floor(Math.random()*values.length)];

document.getElementById("result").innerText = "🎯 " + hit + "%";

pos = 0;
speed = 0;
}

requestAnimationFrame(gameLoop);
}

gameLoop();

/* ================= GLOBE ================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(420,220);
document.getElementById("globe").appendChild(renderer.domElement);

const globe = new THREE.Points(
new THREE.SphereGeometry(1.5,32,32),
new THREE.PointsMaterial({color:0x00ffcc,size:0.02})
);

scene.add(globe);
camera.position.z = 3;

function animate(){
requestAnimationFrame(animate);
globe.rotation.y += 0.002;
renderer.render(scene,camera);
}

animate();

/* ================= NEWS ================= */

function unlock(){
document.getElementById("lock").style.display = "none";
}

</script>

</body>
</html>
