<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capital AI PRO v2</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
body{
margin:0;
background:#050914;
color:#e6edf7;
font-family:Arial;
overflow:hidden;
}

.grid{
display:grid;
grid-template-columns:220px 1fr 360px;
height:100vh;
}

.sidebar{
background:#0b1220;
padding:15px;
}

.item{
padding:10px;
margin-bottom:6px;
background:#111b2e;
border-radius:8px;
cursor:pointer;
}

.main{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#0d1628;
padding:12px;
border-radius:12px;
}

.right{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.widget{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* GAME */
.game{
height:200px;
background:#08101f;
border-radius:12px;
position:relative;
overflow:hidden;
}

.ball{
width:18px;
height:18px;
border-radius:50%;
background:#00ffcc;
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
}

/* NEWS LOCK */
.lock{
position:absolute;
inset:0;
background:rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.lock button{
margin-top:10px;
padding:6px;
border:none;
border-radius:8px;
background:#00ffcc;
cursor:pointer;
}

/* GLOBE */
#globe{
height:220px;
}
</style>
</head>

<body>

<div class="grid">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>PANEL PRO</h3>
<div class="item">Dashboard</div>
<div class="item">Wallet</div>
<div class="item">Markets</div>
<div class="item">Settings</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h2>Hola Trader 👋</h2>
Saldo: <b id="balance">$10,000</b><br>
ROI: <span style="color:#00ffcc">+6% mensual</span>
</div>

<div class="card">
<h4>📊 Estadísticas</h4>
Trades: <span id="trades">0</span><br>
Win rate: <span id="winrate">0%</span><br>
Profit: <span id="profit">$0</span>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<!-- GAME -->
<div class="widget">
<h4>🎯 Skill Game</h4>

<div class="game" id="game">
<div class="ball" id="ball"></div>
</div>

<div>Rendimiento: <b id="result">0%</b></div>
</div>

<!-- WALLET -->
<div class="widget">
<h4>Wallet</h4>
<b id="wallet">$1,234.56</b>
</div>

<!-- GLOBE -->
<div class="widget">
<h4>🌍 Globo</h4>
<div id="globe"></div>
</div>

<!-- NEWS -->
<div class="widget" style="position:relative">
<h4>📰 Noticias</h4>

<div>Bitcoin estable</div>
<div>Ethereum crecimiento</div>

<div class="lock" id="lock">
🔒 Premium 17 MXN / mes
<button onclick="unlockNews()">Unlock</button>
</div>

</div>

</div>

</div>

<script>

/* ================= SAFE CORE ================= */

const $ = (id)=>document.getElementById(id);

function safeSet(id,value){
const el = $(id);
if(el) el.innerText = value;
}

/* ================= STATE ================= */

const state = {
balance:10000,
profit:0,
trades:0,
wins:0,
wallet:1234.56,
premium:false
};

/* ================= UI ================= */

function render(){
safeSet("balance","$"+state.balance.toFixed(2));
safeSet("profit","$"+state.profit.toFixed(2));
safeSet("trades",state.trades);
safeSet("winrate", state.trades ? Math.round((state.wins/state.trades)*100)+"%" : "0%");
safeSet("wallet","$"+state.wallet.toFixed(2));
}

/* ================= GAME ENGINE ================= */

let ball, pos=0, speed=0, dragging=false, startY=0;

function initGame(){

ball = $("ball");

ball.onmousedown = (e)=>{
dragging=true;
startY=e.clientY;
};

document.onmouseup = (e)=>{
if(!dragging) return;

speed = (startY - e.clientY)*0.12;
dragging=false;

state.trades++;
};

function loop(){

pos += speed;
speed -= 0.35;

ball.style.bottom = pos+"px";

if(pos>160){

const zones=[0.5,1,2,3,4,5,6];
const hit = zones[Math.floor(Math.random()*zones.length)];

state.profit += hit;
state.wallet += hit;
state.wins++;

safeSet("result", hit+"%");

pos=0;
speed=0;

render();
}

requestAnimationFrame(loop);
}

loop();
}

/* ================= GLOBE ================= */

function initGlobe(){

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(360,220);
$("globe").appendChild(renderer.domElement);

const globe = new THREE.Points(
new THREE.SphereGeometry(1.5,32,32),
new THREE.PointsMaterial({color:0x00ffcc,size:0.02})
);

scene.add(globe);
camera.position.z=3;

function animate(){
requestAnimationFrame(animate);
globe.rotation.y += 0.002;
renderer.render(scene,camera);
}

animate();
}

/* ================= NEWS ================= */

function unlockNews(){
state.balance -= 17;
state.premium=true;
$("lock").style.display="none";
render();
}

/* ================= INIT ================= */

function init(){
render();
initGame();
initGlobe();
}

window.onload = init;

</script>

</body>
</html>
