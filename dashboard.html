<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capital AI PRO - Skill Game</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050914;
color:#e6edf7;
overflow:hidden;
}

/* GRID */
.dashboard{
display:grid;
grid-template-columns:260px 1fr 420px;
height:100vh;
gap:12px;
padding:12px;
box-sizing:border-box;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
background:#0c1324;
border-radius:14px;
padding:15px;
}

.nav{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#0f1a33;
cursor:pointer;
font-size:14px;
}

.nav:hover{
background:#152545;
}

/* CENTER */
.center{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#0c1324;
padding:12px;
border-radius:12px;
}

/* RIGHT */
.right{
display:flex;
flex-direction:column;
gap:12px;
}

/* WIDGET */
.widget{
background:#0c1324;
border-radius:12px;
padding:12px;
}

/* GLOBE */
#globe{
height:280px;
width:100%;
}

/* COLORS */
.green{color:#00ffcc}
.small{font-size:12px;opacity:0.7}

button{
background:#00ffcc;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
width:100%;
margin-top:6px;
}

.bar{
height:6px;
background:#1a2742;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.fill{
height:100%;
width:50%;
background:#00ffcc;
}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>PANEL PRO</h3>

<div class="nav">Dashboard</div>
<div class="nav">Wallet</div>
<div class="nav">Markets</div>
<div class="nav">Settings</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="card">
<h2>Hola Trader 👋</h2>
Saldo: <b>$10,000</b><br>
ROI: <span class="green">+6% mensual</span>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="widget">
<h4>🌍 Skill Trading Game</h4>
<div class="small">Mantén click para cargar fuerza y suelta para lanzar</div>

<div id="globe"></div>

<b class="green" id="reward">Rendimiento: 0%</b>

<div class="small">Fuerza de tiro</div>
<div class="bar"><div class="fill" id="powerBar"></div></div>

</div>

<div class="widget">
<h4>Wallet</h4>
<b class="green">$1,234.56</b>
</div>

</div>

</div>

<script>

/* ================= DATA ================= */
let reward = 0;
let power = 0;
let charging = false;

/* zones (skill-based outcomes) */
let zones = [
{v:0.5},{v:1},{v:2},{v:3},{v:4},{v:5},{v:6}
];

/* ================= POWER SYSTEM ================= */
document.addEventListener("mousedown",()=>charging=true);
document.addEventListener("mouseup",()=>{
charging=false;
shoot(power);
power = 0;
updateBar();
});

/* charging force */
setInterval(()=>{
if(charging){
power += 2;
if(power > 100) power = 100;
updateBar();
}
},30);

function updateBar(){
document.getElementById("powerBar").style.width = power + "%";
}

/* ================= GAME LOGIC ================= */
function shoot(p){

/* skill influence */
let index = Math.floor((p/100) * zones.length);
if(index < 0) index = 0;
if(index > zones.length-1) index = zones.length-1;

let value = zones[index].v;

/* reward */
reward += value;

document.getElementById("reward").innerText =
"Rendimiento: " + reward.toFixed(2) + "%";
}

/* ================= THREE JS GLOBE ================= */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,1,0.1,1000);

let renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(420,280);

document.getElementById("globe").appendChild(renderer.domElement);

/* globe */
let globe = new THREE.Points(
new THREE.SphereGeometry(1.5,32,32),
new THREE.PointsMaterial({
color:0x00ffcc,
size:0.02
})
);

scene.add(globe);
camera.position.z = 3;

/* animation */
function animate(){

requestAnimationFrame(animate);

/* dynamic speed */
globe.rotation.y += 0.002 + reward * 0.00001;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
