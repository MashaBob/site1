<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trader Game V6 FIX</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
background:#050914;
color:white;
font-family:Arial;
overflow:hidden;
}

.grid{
display:grid;
grid-template-columns:240px 1fr 420px;
height:100vh;
}

/* LEFT */
.left{
background:#0b1220;
padding:15px;
}

.btn{
padding:10px;
background:#111b2e;
margin-bottom:6px;
border-radius:8px;
}

/* CENTER */
.center{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* RIGHT */
.right{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.widget{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* GAME */
.gameArea{
height:260px;
background:#08101f;
border-radius:12px;
position:relative;
overflow:hidden;
}

/* BALL */
.ball{
width:14px;
height:14px;
border-radius:50%;
background:#00ffcc;
position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
}

/* CANVAS OVERLAY */
canvas{
border-radius:12px;
}

/* NEWS */
.news{
position:relative;
background:#111b2e;
padding:10px;
border-radius:10px;
overflow:hidden;
}

.lock{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.75);
}

.lock button{
margin-top:10px;
padding:6px;
border:none;
border-radius:8px;
background:#00ffcc;
cursor:pointer;
}

.green{color:#00ffcc}

</style>
</head>

<body>

<div class="grid">

<!-- LEFT -->
<div class="left">
<h3>PANEL</h3>
<div class="btn">Dashboard</div>
<div class="btn">Wallet</div>
<div class="btn">Market</div>
<div class="btn">Settings</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="card">
<h2>Hola Trader 👋</h2>
Saldo: $10,000
</div>

<div class="card">
📊 Estadísticas
</div>

</div>

<!-- RIGHT -->
<div class="right">

<!-- GAME + GLOBE UNIFIED -->
<div class="widget">
<h4>🎮 Skill + Globe System</h4>

<div class="gameArea" id="sceneBox">
<div class="ball" id="ball"></div>
</div>

</div>

<!-- WALLET -->
<div class="widget">
Wallet: <b>$1,234.56</b>
</div>

<!-- NEWS -->
<div class="widget">
📰 Noticias

<div class="news">

<div>Bitcoin estable</div>
<div>Ethereum sube</div>
<div>Mercado mixto</div>

<div class="lock" id="lock">
🔒 Premium 17 MXN
<button onclick="unlock()">Unlock</button>
</div>

</div>

</div>

</div>

</div>

<script>

/* ================= STATE ================= */

let ball = document.getElementById("ball");
let sceneBox = document.getElementById("sceneBox");

let speedX = 0;
let speedY = 0;
let posX = 0;
let posY = 0;

let dragging = false;
let startX = 0;
let startY = 0;

/* ================= MOUSE AIM ================= */

sceneBox.addEventListener("mousedown",(e)=>{
dragging = true;
startX = e.clientX;
startY = e.clientY;
});

document.addEventListener("mouseup",(e)=>{
if(!dragging) return;

speedX = (e.clientX - startX) * 0.05;
speedY = (e.clientY - startY) * 0.05;

dragging = false;
});

/* ================= BALL PHYSICS ================= */

function loop(){

posX += speedX;
posY += speedY;

/* gravity */
speedY -= 0.3;

/* friction */
speedX *= 0.99;

ball.style.left = (50 + posX) + "%";
ball.style.bottom = (20 + posY) + "px";

/* HIT ZONE (sphere center simulation) */
if(posY > 200){

let zones = [0.5,1,2,3,4,5,6];
let hit = zones[Math.floor(Math.random()*zones.length)];

alert("🎯 HIT: " + hit + "%");

posX = 0;
posY = 0;
speedX = 0;
speedY = 0;
}

requestAnimationFrame(loop);
}

loop();

/* ================= UNLOCK NEWS ================= */

function unlock(){
document.getElementById("lock").style.display="none";
}

/* ================= THREE (VISUAL SPHERE) ================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(420,260);
sceneBox.appendChild(renderer.domElement);

/* globe */
const globe = new THREE.Points(
new THREE.SphereGeometry(1.5,32,32),
new THREE.PointsMaterial({color:0x00ffcc,size:0.02})
);

scene.add(globe);
camera.position.z = 3;

function animate(){
requestAnimationFrame(animate);
globe.rotation.y += 0.002;
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
