<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Trader PRO V9.1</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
background:#050914;
color:white;
font-family:Arial;
overflow:hidden;
}

.layout{
display:grid;
grid-template-columns:240px 1fr 380px;
height:100vh;
}

/* LEFT */
.left{
background:#0b1220;
padding:15px;
}

.btn{
padding:10px;
margin-bottom:6px;
background:#111b2e;
border-radius:8px;
cursor:pointer;
}

/* CENTER */
.center{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* RIGHT */
.right{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.widget{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* GAME + GLOBE */
.game{
height:240px;
background:#08101f;
border-radius:12px;
position:relative;
overflow:hidden;
}

.ball{
width:14px;
height:14px;
border-radius:50%;
background:#00ffcc;
position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
}

/* NEWS */
.news{
position:relative;
background:#111b2e;
padding:10px;
border-radius:10px;
}

.lock{
position:absolute;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.lock button{
margin-top:10px;
background:#00ffcc;
border:none;
padding:6px;
border-radius:8px;
cursor:pointer;
}

.green{color:#00ffcc}

#globe{
height:200px;
}

</style>
</head>

<body>

<div class="layout">

<!-- LEFT -->
<div class="left">
<h3>PANEL PRO</h3>
<div class="btn">Dashboard</div>
<div class="btn">Wallet</div>
<div class="btn">Mercados</div>
<div class="btn">Configuración</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="card">
<h2>Hola Trader 👋</h2>
Saldo: $10,000<br>
Ganancia diaria: <b id="today">$0</b>
</div>

<div class="card">
<h4>📊 Estadísticas</h4>
<canvas id="chart"></canvas>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="widget">
<h4>🎯 Skill Game + Globo</h4>

<div class="game">
<div class="ball" id="ball"></div>
</div>

<p>Rendimiento: <b id="result">0%</b></p>
</div>

<div class="widget">
<h4>📈 Stats</h4>
Trades: <b id="trades">0</b>
</div>

<div class="widget">
<h4>🌍 Globo</h4>
<div id="globe"></div>
</div>

<div class="widget">
<h4>📰 Noticias</h4>

<div class="news">

<div>Bitcoin estable</div>
<div>Ethereum sube</div>
<div>Mercado global mixto</div>

<div class="lock" id="lock">
🔒 Premium 17 MXN/mes
<button onclick="unlock()">Desbloquear</button>
</div>

</div>

</div>

</div>

</div>

<script>

window.onload = function(){

/* ================= STATE ================= */

let balance = 10000;
let todayProfit = 0;
let trades = 0;
let history = [10000];

/* ================= CHART ================= */

const ctx = document.getElementById("chart");

let chart = new Chart(ctx,{
type:"line",
data:{
labels:["D1"],
datasets:[{
data:history,
borderColor:"#00ffcc",
tension:0.3
}]
},
options:{
plugins:{legend:{display:false}}
}
});

/* ================= GAME ================= */

let ball = document.getElementById("ball");

let y = 0;
let speed = 0;

let dragging = false;
let startY = 0;
let scored = false;

ball.onmousedown = (e)=>{
dragging = true;
startY = e.clientY;
};

document.onmouseup = (e)=>{
if(!dragging) return;

speed = (startY - e.clientY) * 0.12;
dragging = false;

trades++;
document.getElementById("trades").innerText = trades;

scored = false;
};

function loop(){

y += speed;
speed -= 0.25;

if(y < 0){ y = 0; speed = 0; }

ball.style.bottom = (20 + y) + "px";

/* HIT */
if(y > 180 && !scored){

scored = true;

const zones = [0.5,1,2,3,4,5,6];
const hit = zones[Math.floor(Math.random()*zones.length)];

todayProfit += hit;
balance += hit;

document.getElementById("result").innerText = hit + "%";
document.getElementById("today").innerText = "$" + todayProfit.toFixed(2);

/* update chart */
history.push(balance);

chart.data.labels.push("D"+history.length);
chart.data.datasets[0].data = [...history];
chart.update();

y = 0;
speed = 0;
}

requestAnimationFrame(loop);
}

loop();

/* ================= GLOBE ================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(380,200);
document.getElementById("globe").appendChild(renderer.domElement);

const globe = new THREE.Points(
new THREE.SphereGeometry(1.5,32,32),
new THREE.PointsMaterial({color:0x00ffcc,size:0.02})
);

scene.add(globe);
camera.position.z = 3;

function animate(){
requestAnimationFrame(animate);
globe.rotation.y += 0.002;
renderer.render(scene,camera);
}

animate();

/* ================= NEWS ================= */

window.unlock = function(){
document.getElementById("lock").style.display="none";
};

};

</script>

</body>
</html>
