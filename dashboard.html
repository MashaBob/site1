<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital AI Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#060b14;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0b1220;
padding:20px;
}

.logo{
color:#00ffcc;
font-weight:bold;
margin-bottom:30px;
}

.menu div{
padding:10px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.menu div:hover{
background:#111a2e;
}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* TOP */
.top{
display:flex;
gap:15px;
}

.card{
flex:1;
background:#0e1628;
padding:15px;
border-radius:15px;
}

.green{color:#00ffcc}

/* CHART */
.chartBox{
margin-top:20px;
background:#0e1628;
padding:15px;
border-radius:15px;
}

/* WALLET */
.wallet{
margin-top:20px;
background:#0e1628;
padding:15px;
border-radius:15px;
}

/* AI */
.ai{
margin-top:20px;
background:#0e1628;
padding:15px;
border-radius:15px;
}

/* GLOBE */
.globeBox{
position:absolute;
right:20px;
top:80px;
width:320px;
height:320px;
}

canvas{
width:100%;
height:100%;
}

.glow{
position:absolute;
right:-120px;
bottom:-120px;
width:400px;
height:400px;
background:radial-gradient(circle,#00ffcc33,transparent 60%);
filter:blur(20px);
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">CAPITAL AI PRO</div>

<div class="menu">
<div>📊 Dashboard</div>
<div>💼 Wallet</div>
<div>📈 AI Signals</div>
<div>🌍 Markets</div>
<div>⚙ Settings</div>
</div>
</div>

<!-- MAIN -->
<div class="main">

<h2>Hola 👋 Trader</h2>

<!-- TOP CARDS -->
<div class="top">

<div class="card">
Saldo<br>
<h3>$10,000</h3>
</div>

<div class="card">
ROI<br>
<h3 class="green">+6% mensual</h3>
</div>

<div class="card">
Riesgo<br>
<h3>Low</h3>
</div>

</div>

<!-- CHART -->
<div class="chartBox">
<canvas id="chart"></canvas>
</div>

<!-- WALLET -->
<div class="wallet">
<h3>Wallet</h3>
Disponible: <b class="green">$1,234.56</b><br>
Bloqueado: $0
</div>

<!-- AI -->
<div class="ai">
<h3>AI Activity</h3>
<div>🤖 BTC signal detected</div>
<div>📊 Portfolio optimized</div>
<div>🌍 Market trend bullish</div>
</div>

</div>
</div>

<!-- GLOBE -->
<div class="globeBox" id="globe"></div>
<div class="glow"></div>

<script>

/* ================= CHART ================= */
new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets:[{
data:[10000,10300,10100,10800,11200,11800,12500],
borderColor:'#00ffcc',
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
});

/* ================= 3D GLOBE ================= */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,1,0.1,1000);

let renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(320,320);
document.getElementById("globe").appendChild(renderer.domElement);

/* SPHERE */
let geometry = new THREE.SphereGeometry(1.5,32,32);

let material = new THREE.PointsMaterial({
color:0x00ffcc,
size:0.02
});

let globe = new THREE.Points(geometry, material);
scene.add(globe);

camera.position.z = 3;

/* mouse control */
let mouseX = 0;
document.addEventListener("mousemove",(e)=>{
mouseX = (e.clientX / window.innerWidth)*2 - 1;
});

/* animate */
function animate(){
requestAnimationFrame(animate);

globe.rotation.y += 0.002;
globe.rotation.x = mouseX * 0.3;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
