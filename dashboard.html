<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital AI Pro | Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050914;
color:white;
overflow:hidden;
}

/* MAIN SPLIT */
.wrapper{
display:flex;
height:100vh;
}

/* LEFT PANEL */
.left{
width:65%;
padding:20px;
overflow:auto;
}

/* RIGHT PANEL */
.right{
width:35%;
background:#070f1f;
position:relative;
}

/* TOP INFO */
.top{
display:flex;
gap:10px;
}

.card{
flex:1;
background:#0e1628;
padding:12px;
border-radius:12px;
}

/* CHART */
.chartBox{
margin-top:15px;
background:#0e1628;
padding:15px;
border-radius:15px;
}

/* NEWS */
.news{
margin-top:15px;
background:#0e1628;
padding:15px;
border-radius:15px;
}

.news h3{
margin-top:0;
color:#00ffcc;
}

.news-item{
padding:8px 0;
border-bottom:1px solid #1a2440;
font-size:13px;
}

/* GLOBE */
#globe{
width:100%;
height:100%;
}

/* DIVIDER LINE */
.divider{
position:absolute;
left:0;
top:0;
width:2px;
height:100%;
background:#00ffcc33;
}

.green{color:#00ffcc}

</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<h2>Hola 👋 Trader</h2>

<div class="top">

<div class="card">
Saldo<br><b>$10,000</b>
</div>

<div class="card">
ROI<br><b class="green">+6% mensual</b>
</div>

<div class="card">
Riesgo<br><b>Low</b>
</div>

</div>

<div class="chartBox">
<canvas id="chart"></canvas>
</div>

<div class="news">
<h3>📰 AI Market News (Daily)</h3>

<div class="news-item">📈 BTC breaks resistance level</div>
<div class="news-item">🌍 US inflation data impacts crypto</div>
<div class="news-item">🤖 AI signals increase trading volume</div>
<div class="news-item">💰 Ethereum network activity grows</div>
<div class="news-item">📊 Market volatility expected today</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">
<div id="globe"></div>
<div class="divider"></div>
</div>

</div>

<script>

/* ================= CHART ================= */
new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets:[{
data:[10000,10300,10150,10900,11300,11800,12400],
borderColor:'#00ffcc',
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
});

/* ================= 3D GLOBE ================= */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,1,0.1,1000);

let renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth*0.35,window.innerHeight);

document.getElementById("globe").appendChild(renderer.domElement);

/* sphere */
let geometry = new THREE.SphereGeometry(1.5,32,32);

let material = new THREE.PointsMaterial({
color:0x00ffcc,
size:0.02
});

let globe = new THREE.Points(geometry, material);
scene.add(globe);

camera.position.z = 3;

/* rotation */
function animate(){
requestAnimationFrame(animate);

globe.rotation.y += 0.002;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
