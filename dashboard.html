<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Pro Trader</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#050914;
color:#e6edf7;
}

.layout{
display:grid;
grid-template-columns:220px 1fr 380px;
height:100vh;
}

.sidebar{
background:#0b1220;
padding:15px;
}

.menu{
padding:10px;
background:#111b2e;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.main{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#0d1628;
padding:12px;
border-radius:12px;
}

.right{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.widget{
background:#0d1628;
padding:12px;
border-radius:12px;
}

/* GAME */
.gameBox{
height:200px;
background:#08101f;
border-radius:12px;
position:relative;
overflow:hidden;
}

.ball{
width:18px;
height:18px;
background:#00ffcc;
border-radius:50%;
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
}

/* NEWS LOCK */
.lock{
position:absolute;
inset:0;
background:rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.lock button{
margin-top:10px;
padding:8px;
background:#00ffcc;
border:none;
border-radius:8px;
cursor:pointer;
}

/* GLOBE */
#globe{
height:220px;
}
</style>
</head>

<body>

<div class="layout">

<!-- LEFT -->
<div class="sidebar">
<h3>PANEL PRO</h3>
<div class="menu">Dashboard</div>
<div class="menu">Wallet</div>
<div class="menu">Markets</div>
<div class="menu">Settings</div>
</div>

<!-- CENTER -->
<div class="main">

<div class="card">
<h2>Hola Trader 👋</h2>
Saldo: <b id="balance">$10,000</b><br>
ROI: <span style="color:#00ffcc">+6% mensual</span>
</div>

<div class="card">
<h4>📊 Estadísticas</h4>
Trades: <span id="trades">0</span><br>
Win rate: <span id="winrate">0%</span><br>
Profit: <span id="profit">$0</span>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<!-- GAME -->
<div class="widget">
<h4>🎯 Skill Game</h4>

<div class="gameBox" id="game">
<div class="ball" id="ball"></div>
</div>

<div>Rendimiento: <b id="result">0%</b></div>
</div>

<!-- WALLET -->
<div class="widget">
<h4>Wallet</h4>
<b id="wallet">$1,234.56</b>
</div>

<!-- GLOBE -->
<div class="widget">
<h4>🌍 Globo</h4>
<div id="globe"></div>
</div>

<!-- NEWS -->
<div class="widget" style="position:relative">
<h4>📰 Noticias</h4>

<div>Bitcoin estable</div>
<div>Ethereum en crecimiento</div>

<div class="lock" id="lock">
🔒 Premium bloqueado<br>
<small>17 MXN / mes</small>
<button onclick="unlock()">Desbloquear</button>
</div>

</div>

</div>

</div>

<script>

/* STATE */
let state = {
balance:10000,
profit:0,
trades:0,
wins:0,
wallet:1234.56
};

function update(){
document.getElementById("balance").innerText = "$"+state.balance.toFixed(2);
document.getElementById("profit").innerText = "$"+state.profit.toFixed(2);
document.getElementById("trades").innerText = state.trades;
document.getElementById("winrate").innerText =
state.trades ? Math.round((state.wins/state.trades)*100)+"%" : "0%";
document.getElementById("wallet").innerText = "$"+state.wallet.toFixed(2);
}

/* GAME */
let ball = document.getElementById("ball");
let pos = 0;
let speed = 0;
let dragging = false;
let startY = 0;

ball.addEventListener("mousedown",(e)=>{
dragging=true;
startY=e.clientY;
});

document.addEventListener("mouseup",(e)=>{
if(!dragging) return;
speed = (startY - e.clientY) * 0.12;
dragging=false;
state.trades++;
});

function gameLoop(){

pos += speed;
speed -= 0.35;

ball.style.bottom = pos + "px";

if(pos > 160){

let values = [0.5,1,2,3,4,5,6];
let hit = values[Math.floor(Math.random()*values.length)];

state.profit += hit;
state.wallet += hit;
state.wins++;

document.getElementById("result").innerText =
hit + "% ganado";

pos = 0;
speed = 0;

update();
}

requestAnimationFrame(gameLoop);
}

gameLoop();

/* NEWS */
function unlock(){
state.balance -= 17;
document.getElementById("lock").style.display="none";
update();
}

/* GLOBE */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
let renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(360,220);
document.getElementById("globe").appendChild(renderer.domElement);

let globe = new THREE.Points(
new THREE.SphereGeometry(1.5,32,32),
new THREE.PointsMaterial({color:0x00ffcc,size:0.02})
);

scene.add(globe);
camera.position.z = 3;

function animate(){
requestAnimationFrame(animate);
globe.rotation.y += 0.002;
renderer.render(scene,camera);
}

animate();

update();

</script>

</body>
</html>
