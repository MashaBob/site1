<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Capital Inteligente</title>

<style>

/* ===================================================== */
/* BODY */
/* ===================================================== */

body{

    margin:0;

    background:#0b1220;

    font-family:Arial;

    color:white;

    overflow-x:hidden;

    position:relative;

}

/* ===================================================== */
/* BACKGROUND GRID */
/* ===================================================== */

body::before{

    content:"";

    position:fixed;

    width:100%;
    height:100%;

    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

    background-size:40px 40px;

    z-index:-1;

}

/* ===================================================== */
/* CONTAINER */
/* ===================================================== */

.container{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:60px;

}

/* ===================================================== */
/* LEFT SIDE */
/* ===================================================== */

.left{

    width:38%;

}

.small{

    font-size:14px;

    opacity:0.7;

}

.green{

    color:#00ffcc;

    font-size:22px;

    margin-top:5px;

    font-weight:bold;

}

h1{

    font-size:92px;

    line-height:0.9;

    margin:20px 0;

    text-shadow:
    0 0 30px rgba(255,255,255,0.2);

}

.desc{

    opacity:0.7;

    margin-bottom:25px;

    font-size:16px;

    line-height:1.6;

}

/* ===================================================== */
/* BUTTON */
/* ===================================================== */

button{

    background:#00ffcc;

    border:none;

    padding:16px 36px;

    border-radius:14px;

    font-size:17px;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 25px rgba(0,255,200,0.25);

}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 0 40px rgba(0,255,200,0.45);

}

/* ===================================================== */
/* LIVE PRICES */
/* ===================================================== */

.prices{

    display:flex;

    gap:10px;

    margin-top:25px;

}

.prices span{

    background:#1a2335;

    padding:10px 15px;

    border-radius:12px;

    font-size:14px;

    border:1px solid rgba(255,255,255,0.05);

}

/* ===================================================== */
/* CARDS */
/* ===================================================== */

.stats-advanced{

    display:flex;

    gap:20px;

    margin-top:40px;

    flex-wrap:wrap;

}

.card{

    position:relative;

    overflow:hidden;

    background:rgba(255,255,255,0.03);

    border:1px solid rgba(0,255,200,0.15);

    border-radius:18px;

    padding:20px 24px;

    min-width:180px;

    backdrop-filter:blur(12px);

    transition:0.3s;

    box-shadow:
    0 0 25px rgba(0,255,200,0.05);

}

.card::before{

    content:"";

    position:absolute;

    width:120px;
    height:120px;

    background:rgba(0,255,200,0.04);

    border-radius:50%;

    top:-40px;
    right:-40px;

}

.card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 0 30px rgba(0,255,200,0.2);

}

.label{

    font-size:13px;

    color:#9ca3af;

}

.value{

    font-size:24px;

    font-weight:bold;

}

.value.green{

    color:#00ffc8;

}

.card .desc{

    font-size:12px;

    color:#6b7280;

}

/* ===================================================== */
/* RIGHT SIDE */
/* ===================================================== */

.right{

    width:58%;

    display:flex;

    flex-direction:column;

    align-items:center;

}

/* ===================================================== */
/* SPHERE */
/* ===================================================== */

.sphere-wrap{

    position:relative;

    width:760px;
    height:760px;

    display:flex;

    justify-content:center;
    align-items:center;

}

.glow{

    position:absolute;

    width:520px;
    height:520px;

    background:radial-gradient(
        circle,
        rgba(0,255,200,0.25),
        transparent
    );

    border-radius:50%;

    filter:blur(40px);

    z-index:1;

}

/* ===================================================== */
/* ORBITS */
/* ===================================================== */

.orbit{

    position:absolute;

    border:1px solid rgba(0,255,200,0.08);

    border-radius:50%;

    z-index:1;

}

/* ===================================================== */
/* LINES */
/* ===================================================== */

.line{

    position:absolute;

    height:2px;

    background:rgba(0,255,200,0.25);

    transform-origin:left center;

    z-index:2;

    box-shadow:
    0 0 15px rgba(0,255,200,0.3);

}

/* ===================================================== */
/* GLOBE */
/* ===================================================== */

.globe-container{

    position:relative;

    width:700px;
    height:700px;

    z-index:2;

}

.globe-container canvas{

    position:absolute;

    top:0;
    left:0;

    width:700px;
    height:700px;

}

/* ===================================================== */
/* COUNTRIES */
/* ===================================================== */

.city{

    position:absolute;

    transform:translate(-50%,-50%);

    color:#00ffc3;

    font-size:13px;

    padding:7px 14px;

    border-radius:14px;

    background:rgba(0,255,200,0.08);

    border:1px solid rgba(0,255,200,0.35);

    white-space:nowrap;

    z-index:5;

    backdrop-filter:blur(8px);

    box-shadow:
    0 0 18px rgba(0,255,200,0.15);

}

/* ===================================================== */
/* CHART */
/* ===================================================== */

.chart{

    width:620px;

    margin-top:-40px;

}

</style>

</head>

<body>

<script>

const API_KEY = "DQBKGW2B7BDA8NC7";

/* ===================================================== */
/* MARKET DATA */
/* ===================================================== */

async function loadMarketData(){

try{

const markets = [

{
id:"usa",
symbol:"SPY",
name:"🇺🇸 Estados Unidos"
},

{
id:"canada",
symbol:"EWC",
name:"🇨🇦 Canadá"
},

{
id:"mexico",
symbol:"EWW",
name:"🇲🇽 México"
},

{
id:"uk",
symbol:"EWU",
name:"🇬🇧 Reino Unido"
},

{
id:"france",
symbol:"EWQ",
name:"🇫🇷 Francia"
},

{
id:"germany",
symbol:"EWG",
name:"🇩🇪 Alemania"
},

{
id:"japan",
symbol:"EWJ",
name:"🇯🇵 Japón"
},

{
id:"hongkong",
symbol:"EWH",
name:"🇭🇰 Hong Kong"
},

{
id:"australia",
symbol:"EWA",
name:"🇦🇺 Australia"
},

{
id:"brazil",
symbol:"EWZ",
name:"🇧🇷 Brasil"
}

];

for(const market of markets){

const res = await fetch(
`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${market.symbol}&apikey=${API_KEY}`
);

const data = await res.json();

const quote = data["Global Quote"];

if(quote){

const change = quote["10. change percent"];

document.getElementById(market.id).innerHTML =
`${market.name}<br>${change}`;

}

}

}catch(e){

console.log(e);

}

}

/* ===================================================== */
/* CANVAS */
/* ===================================================== */

const canvas = document.getElementById("sphere");

const ctx = canvas.getContext("2d");

let mouseX = 0;
let mouseY = 0;

let angleX = 0;
let angleY = 0;

let auto = 0;

canvas.addEventListener("mousemove", e => {

let rect = canvas.getBoundingClientRect();

mouseX = (e.clientX - rect.left - 350) / 350;

mouseY = (e.clientY - rect.top - 350) / 350;

});

const pts = [];

for(let i = 0; i < 1500; i++){

let t = Math.random() * Math.PI * 2;

let p = Math.acos(Math.random() * 2 - 1);

let r = 250;

pts.push({

x:r*Math.sin(p)*Math.cos(t),

y:r*Math.sin(p)*Math.sin(t),

z:r*Math.cos(p)

});

}

function draw(){

ctx.clearRect(0,0,700,700);

auto += 0.002;

angleX += (mouseY - angleX) * 0.05;

angleY += (mouseX + auto - angleY) * 0.05;

pts.forEach(p => {

let x = p.x;

let y = p.y*Math.cos(angleX)-p.z*Math.sin(angleX);

let z = p.y*Math.sin(angleX)+p.z*Math.cos(angleX);

let x2 = x*Math.cos(angleY)-z*Math.sin(angleY);

let z2 = x*Math.sin(angleY)+z*Math.cos(angleY);

let scale = 600/(600+z2);

let px = 350 + x2*scale;

let py = 350 + y*scale;

ctx.beginPath();

ctx.arc(px,py,2*scale,0,Math.PI*2);

ctx.fillStyle = "#00ffcc";

ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

/* ===================================================== */
/* LIVE PRICES */
/* ===================================================== */

async function loadPrices(){

try{

const res = await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd,mxn"
);

const data = await res.json();

document.getElementById("btc").innerHTML =
"BTC: $" + data.bitcoin.usd.toLocaleString();

document.getElementById("eth").innerHTML =
"ETH: $" + data.ethereum.usd.toLocaleString();

document.getElementById("mxn").innerHTML =
"MXN: " + data.bitcoin.mxn.toLocaleString();

}catch(e){

console.log(e);

}

}

loadPrices();

setInterval(loadPrices,10000);

/* ===================================================== */
/* ANIMATION */
/* ===================================================== */

function animateValue(id,start,end,duration){

let obj = document.getElementById(id);

let startTime = null;

function step(timestamp){

if(!startTime){

startTime = timestamp;

}

let progress = Math.min(
(timestamp - startTime) / duration,
1
);

if(id === "profit"){

obj.innerHTML =
"+" + Math.floor(
progress * (end - start) + start
);

}else{

obj.innerHTML =
Math.floor(
progress * (end - start) + start
) + "%";

}

if(progress < 1){

requestAnimationFrame(step);

}

}

requestAnimationFrame(step);

}

animateValue("profit",0,9434,2000);

animateValue("win",0,83,2000);

/* ===================================================== */
/* START MARKET DATA */
/* ===================================================== */

loadMarketData();

setInterval(loadMarketData,60000);

/* ===================================================== */
/* TRADINGVIEW */
/* ===================================================== */

new TradingView.widget({

width:620,

height:360,

symbol:"BINANCE:BTCUSDT",

interval:"15",

theme:"dark",

container_id:"chart"

});

</script>
